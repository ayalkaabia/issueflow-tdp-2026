server:
  port: 8080

spring:
  application:
    name: issueflow
  datasource:
    url: jdbc:postgresql://localhost:5432/issueflow
    username: issueflow
    password: issueflow
    driverClassName: org.postgresql.Driver
    platform: postgres
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
  sql:
    init:
      mode: never
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

issueflow:
  escalation:
    # Scheduler interval for overdue-ticket priority escalation (milliseconds)
    fixed-delay-ms: 60000
  attachments:
    upload-dir: uploads
  jwt:
    secret: issueflow-dev-secret-change-in-production-min-32-chars-long
    expiration-seconds: 3600
