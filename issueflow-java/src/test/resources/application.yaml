server:
  port: 8080

spring:
  application:
    name: issueflow-test
  datasource:
    url: jdbc:h2:mem:issueflow-test;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  sql:
    init:
      mode: never

issueflow:
  escalation:
    # Effectively disable the scheduler during tests (runs once per year)
    fixed-delay-ms: 31536000000
  attachments:
    upload-dir: ${java.io.tmpdir}/issueflow-test-uploads
  jwt:
    secret: issueflow-test-secret-must-be-at-least-32-characters
    expiration-seconds: 3600
