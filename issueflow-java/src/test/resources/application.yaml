server:
  port: 8080

spring:
  application:
    name: issueflow-test
  datasource:
    url: jdbc:h2:mem:issueflow-test;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  sql:
    init:
      mode: never
